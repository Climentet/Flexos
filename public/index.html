<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reto - Acceso</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-gradient">
  <main class="center">
    <p class="eyebrow">Access Node</p>
    <h1 class="brand">Reto Amigos</h1>
    <p class="subcopy">Introduce la contraseña para entrar al reto</p>
    <form id="loginForm">
      <label>Contraseña</label>
      <input id="password" name="password" type="password" required autocomplete="off" />
      <button type="submit" class="btn">Entrar</button>
    </form>
    <div class="accent-line"></div>
    <p class="muted">Pista: pregunta al organizador si no la recuerdas.</p>
  </main>
  <script src="/login.js"></script>
</body>
</html>
